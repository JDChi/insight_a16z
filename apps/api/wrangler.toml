name = "insight-a16z-api"
main = "src/index.ts"
compatibility_date = "2026-04-12"

[vars]
AUTH_MODE = "cloudflare-access"
AI_MODEL = "gpt-4.1-mini"

[[d1_databases]]
binding = "DB"
database_name = "insight-a16z"
database_id = "replace-with-your-d1-id"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "insight-a16z-content"

[triggers]
crons = ["0 2 * * 1"]
