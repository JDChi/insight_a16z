name = "insight-a16z-api"
main = "src/index.ts"
compatibility_date = "2026-04-12"

[vars]
AUTH_MODE = "cloudflare-access"
AI_COMPAT_MODE = "anthropic"
AI_BASE_URL = "https://api.minimaxi.com/anthropic/v1"
AI_MODEL = "MiniMax-M2.7-highspeed"
SEED_FIXTURES = "false"
# Configure as a Worker secret in production, not in git.
# ADMIN_TRIGGER_TOKEN = ""

[[d1_databases]]
binding = "DB"
database_name = "insight-a16z"
database_id = "b631a201-6bd0-46f9-bd9a-b8d56a6e9aa9"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "insight-a16z-content"

[triggers]
crons = ["*/10 * * * *", "0 */8 * * *"]
